name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Check out your repo code onto GitHub's runner VM
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: SSH into EC2 and run deployment commands
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app

            # Pull latest code from GitHub
            git pull origin main

            # Install docker compose plugin if not already installed
            docker compose version || sudo yum install -y docker-compose-plugin

            # Stop all running containers defined in compose file
            docker compose down

            # Rebuild app image and start all 3 containers (app + prometheus + grafana)
            docker compose up -d --build